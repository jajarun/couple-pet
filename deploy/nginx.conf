server {
    listen 80;
    server_name _;

    # 前端静态资源（Vite 打包产物，bind-mount 自本地 frontend/dist）
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # PWA manifest：补上 MIME（nginx 默认 mime.types 不含 .webmanifest）
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Service Worker：别长缓存，改动能及时生效；作用域要在站点根
    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    # SPA 路由：找不到文件就回退到 index.html（React Router 前端接管）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/* 反代到后端；后端路由在根路径，trailing slash 去掉 /api 前缀
    #   /api/auth/login → http://backend:8000/auth/login
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
